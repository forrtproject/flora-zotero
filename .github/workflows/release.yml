name: Create Release

on:
  push:
    tags:
      - 'v*'  # Trigger on version tags like v0.3.0, v1.0.0, etc.
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v0.3.0)'
        required: true
        default: 'v0.3.0'

permissions:
  contents: write
  actions: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Get version from package.json
        id: package_version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "VERSION=v${VERSION}" >> $GITHUB_OUTPUT
          echo "VERSION_NUM=${VERSION}" >> $GITHUB_OUTPUT
          echo "Package version: v${VERSION}"

      - name: Determine release version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${{ steps.package_version.outputs.VERSION }}"
          fi
          VERSION_NUM=$(echo "$VERSION" | sed 's/^v//')

          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "VERSION_NUM=$VERSION_NUM" >> $GITHUB_OUTPUT
          echo "Release version: $VERSION (numeric: $VERSION_NUM)"

      - name: Build plugin
        run: npm run build

      - name: Verify build
        run: |
          echo "Build verification:"
          XPI_FILE=$(ls .scaffold/build/*.xpi)
          ls -lh "$XPI_FILE"

          echo ""
          echo "XPI contents (first 50 files):"
          unzip -l "$XPI_FILE" | head -55

      - name: Prepare XPI for release
        run: |
          # The scaffold creates the XPI with the correct name based on addonName
          # We use this name directly to match update.json
          XPI_SOURCE=$(ls .scaffold/build/*.xpi)
          XPI_BASENAME=$(basename "$XPI_SOURCE")

          cp "$XPI_SOURCE" "./$XPI_BASENAME"
          echo "XPI_NAME=$XPI_BASENAME" >> $GITHUB_ENV
          echo "XPI file: $XPI_BASENAME"

      - name: Create update.json
        run: |
          VERSION_NUM="${{ steps.version.outputs.VERSION_NUM }}"
          VERSION="${{ steps.version.outputs.VERSION }}"
          # Use the same XPI filename that scaffold generates
          XPI_NAME="${{ env.XPI_NAME }}"

          # Compute SHA-512 hash of the XPI file for update verification
          XPI_HASH=$(sha512sum "$XPI_NAME" | cut -d' ' -f1)
          echo "XPI SHA-512 hash: $XPI_HASH"

          cat > update.json << EOF
          {
            "addons": {
              "replication-checker@forrt.org": {
                "updates": [
                  {
                    "version": "$VERSION_NUM",
                    "update_link": "https://github.com/forrtproject/flora_zotero/releases/download/${VERSION}/${XPI_NAME}",
                    "update_hash": "sha512:${XPI_HASH}",
                    "applications": {
                      "zotero": {
                        "strict_min_version": "7.0",
                        "strict_max_version": "8.*"
                      }
                    }
                  }
                ]
              }
            }
          }
          EOF

          echo "Created update.json:"
          cat update.json

      - name: Read release notes
        id: release_notes
        run: |
          if [ -f "docs/Release.md" ]; then
            # Strip comment lines (lines starting with <!--) before inserting
            NOTES=$(grep -v '^\s*<!--' docs/Release.md | grep -v '^\s*-->' | sed '/^[[:space:]]*$/d')
          else
            NOTES="See commit history for changes in this release."
          fi
          echo "NOTES<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          # Also write to a temp file so later steps can read it without
          # embedding multi-line values directly in YAML shell scripts.
          echo "$NOTES" > /tmp/release_notes.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: Zotero Replication Checker ${{ steps.version.outputs.VERSION }}
          draft: false
          prerelease: ${{ contains(steps.version.outputs.VERSION, 'beta') || contains(steps.version.outputs.VERSION, 'alpha') }}
          generate_release_notes: false
          body: |
            ## Zotero Replication Checker ${{ steps.version.outputs.VERSION }}

            Privacy-first plugin to discover replications from the FORRT Literature Database (FLoRA).

            **Direct Download:** [`${{ env.XPI_NAME }}`](https://github.com/forrtproject/flora_zotero/releases/download/${{ steps.version.outputs.VERSION }}/${{ env.XPI_NAME }})

            ---

            ### ✨ New in This Release

            ${{ steps.release_notes.outputs.NOTES }}

            ---

            ### 📥 Installation

            1. Click the **Direct Download** link above, or download the `.xpi` file from **Assets** below
            2. Open Zotero version 7+
            3. Go to **Tools → Add-ons (or Plugins)**
            4. Click the gear icon ⚙️ → **Install Add-on (or Plugins) From File**
            5. Select the downloaded `.xpi` file

            ---

            ### 🎯 Features

            - ✅ **Replication Detection** - Finds replication studies and tags originals with "Has Replication" and outcome tags
            - ✅ **Reproduction Detection** - Finds computational reproductions with dedicated notes and "Has Reproduction" tags
            - ✅ **Multiple Originals Support** - Items with more than one original get an "Original Articles" note with titles, DOIs, and outcomes
            - ✅ **Check Entire Library** - Scan all items via Tools → Check Current Library for Replications
            - ✅ **Check Collections** - Right-click any collection to check for replications
            - ✅ **Check Individual Items** - Right-click items to check selected ones
            - ✅ **Auto-Check New Items** - Automatically checks items when added to your library
            - ✅ **Detailed Notes** - Replication/reproduction info added as child notes with DOI links and outcomes
            - ✅ **Read-Only Library Support** - Copies originals and replications to Personal library for read-only group libraries
            - ✅ **Configurable Folder Names** - Customize collection names for replications and reproductions in Preferences
            - ✅ **Blacklist Management** - Ban unwanted replications from being re-added in future checks
            - ✅ **Privacy-First Design** - Hash-based lookup protects your DOIs — no raw identifiers sent
            - ✅ **Multi-Language Support** - Available in 8 languages (English, German, French, Spanish, Portuguese, Korean, Chinese, Arabic)
            - ✅ **3-Screen Interactive Onboarding** - Guided tour on first install
            - ✅ **User Guide in Help Menu** - Access onboarding anytime from Help → Replication Checker User Guide
            - ✅ **Auto-Cleanup** - Preferences cleared on uninstall

            ---

            ### 👥 Contributors

            [View all Zotero Replication Checker Plugin contributors](https://forrt.org/contributors/?project=flora-zotero-plugin&&collapse-filter)

            ---

            The plugin will automatically check for updates using `update.json`.
          files: |
            ${{ env.XPI_NAME }}
            update.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update CHANGELOG.md
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          DATE=$(date -u +%Y-%m-%d)

          # Build the new CHANGELOG entry from the notes file written earlier.
          # Using printf + a temp file avoids embedding multi-line values in YAML.
          printf '## [%s] - %s\n' "$VERSION" "$DATE" > /tmp/new_entry.md
          cat /tmp/release_notes.txt >> /tmp/new_entry.md
          printf '\n' >> /tmp/new_entry.md

          # Insert the new entry right after the first "---" separator in
          # CHANGELOG.md so the newest release always appears first.
          if [ -f "CHANGELOG.md" ]; then
            SEP_LINE=$(grep -n '^---$' CHANGELOG.md | head -1 | cut -d: -f1)
            if [ -n "$SEP_LINE" ]; then
              head -n "$SEP_LINE" CHANGELOG.md > /tmp/changelog_new.md
              printf '\n' >> /tmp/changelog_new.md
              cat /tmp/new_entry.md >> /tmp/changelog_new.md
              tail -n +"$((SEP_LINE + 1))" CHANGELOG.md >> /tmp/changelog_new.md
              mv /tmp/changelog_new.md CHANGELOG.md
            else
              cat /tmp/new_entry.md CHANGELOG.md > /tmp/changelog_new.md
              mv /tmp/changelog_new.md CHANGELOG.md
            fi
          else
            printf '# Changelog\n\nAll notable changes are documented here.\n\n---\n\n' > CHANGELOG.md
            cat /tmp/new_entry.md >> CHANGELOG.md
          fi

          echo "CHANGELOG.md updated for $VERSION"

      - name: Commit CHANGELOG.md and reset Release.md
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout main

          # Reset Release.md ready for the next release cycle
          printf '<!-- Update this file before each release. It will be inserted into the GitHub Release body under "\xe2\x9c\xa8 New in This Release" and prepended to CHANGELOG.md. Use markdown bullet points. -->\n' > docs/Release.md

          git add CHANGELOG.md docs/Release.md
          git diff --staged --quiet || git commit -m "chore: update CHANGELOG.md and reset Release.md for ${{ steps.version.outputs.VERSION }} [skip ci]"
          git push origin main

      - name: Trigger GitHub Pages rebuild
        run: |
          echo "Triggering GitHub Pages workflow to update update.json..."
          gh workflow run pages.yml
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
