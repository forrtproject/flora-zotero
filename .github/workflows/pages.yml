name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  release:
    types: [published]
  workflow_dispatch:

# Sets permissions for GitHub Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies and build
        run: |
          npm install
          npm run build

      - name: Create docs directory
        run: |
          mkdir -p docs

          # Copy Website.md as index
          cp docs/Website.md docs/index.md

          # Copy README.md as the Documentation page
          if [ -f "README.md" ]; then
            cp README.md docs/documentation.md
          fi

          # Copy other documentation
          if [ -f "CONTRIBUTING.md" ]; then
            cp CONTRIBUTING.md docs/contributing.md
          fi

          if [ -f ".github/RELEASE_GUIDE.md" ]; then
            cp .github/RELEASE_GUIDE.md docs/release-guide.md
          fi

          # Copy favicon and assets
          mkdir -p docs/assets
          if [ -f "addon/content/icons/favicon.png" ]; then
            cp addon/content/icons/favicon.png docs/assets/favicon.png
          fi
          if [ -f "docs/logo/replication-checker-logo.svg" ]; then
            cp docs/logo/replication-checker-logo.svg docs/assets/replication-checker-logo.svg
          fi

          # Download update.json from the latest GitHub release
          # The release workflow creates update.json with the correct hash for the release XPI
          echo "Fetching update.json from latest release..."
          LATEST_RELEASE=$(curl -s https://api.github.com/repos/forrtproject/flora_zotero/releases/latest)
          UPDATE_JSON_URL=$(echo "$LATEST_RELEASE" | jq -r '.assets[]? | select(.name == "update.json") | .browser_download_url' 2>/dev/null || echo "")

          if [ -n "$UPDATE_JSON_URL" ] && [ "$UPDATE_JSON_URL" != "null" ]; then
            echo "Downloading update.json from: $UPDATE_JSON_URL"
            curl -L -o docs/update.json "$UPDATE_JSON_URL"
            echo "✅ Downloaded update.json from latest release"
            echo "Update.json contents:"
            cat docs/update.json
          elif [ -f ".scaffold/build/update.json" ]; then
            echo "⚠️ No update.json in latest release, falling back to scaffold build"
            cp .scaffold/build/update.json docs/update.json
            echo "Update.json contents:"
            cat docs/update.json
          else
            echo "⚠️ Warning: update.json not found"
          fi

      - name: Create _config.yml for Jekyll
        run: |
          cat > docs/_config.yml << 'EOF'
          title: Zotero Replication Checker
          description: Privacy-first plugin to discover replications from the FORRT Library of Replication Attempts (FLoRA)

          # Navigation
          navigation:
            - title: Home
              url: /
            - title: Release Guide
              url: /release-guide
            - title: Contributing
              url: /contributing

          # GitHub metadata
          github:
            repository_url: https://github.com/forrtproject/flora_zotero

          # FORRT branding
          forrt:
            main_site: https://forrt.org/
            project_name: FORRT Project
            tagline: Framework for Open and Reproducible Research Training

          # Plugin info
          plugin:
            version: 0.3.0
            min_zotero: "7.0"
            max_zotero: "8.*"
          EOF

      - name: Create custom layout
        run: |
          mkdir -p docs/_layouts
          cat > docs/_layouts/default.html << 'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>{{ page.title | default: site.title }}</title>
            <link rel="icon" type="image/png" href="{{ site.baseurl }}/assets/favicon.png">
            <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.5.0/github-markdown.min.css">
            <link rel="preconnect" href="https://fonts.googleapis.com">
            <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
            <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Domine:400,400italic,700&display=swap" type="text/css">
            <style>
              /* FORRT color scheme - matched to forrt.org */
              :root {
                --navbar-color: #5a5a5a;       /* Dark gray - FORRT navbar */
                --primary-color: #004055;      /* Dark teal - FORRT primary (links, buttons) */
                --primary-hover: #003344;      /* Darker teal for hover */
                --accent-color: #b8336a;       /* Magenta - FORRT active/accent */
                --brand-color: #69b3a2;        /* Sage green - FORRT brand */
                --background-cream: #fefdf6;   /* Cream background - FORRT body bg */
                --section-gray: #f8f9fa;       /* Light gray sections */
                --text-dark: #212529;          /* Dark text */
                --text-muted: #6c757d;         /* Muted text */
                --border-color: #dee2e6;       /* Border color */
                --shadow-color: rgba(0, 64, 85, 0.1);  /* Shadow with FORRT teal tint */
              }

              * {
                box-sizing: border-box;
              }

              body {
                font-family: Domine, serif;
                margin: 0;
                padding: 0;
                background: var(--background-cream);
                color: rgba(0, 0, 0, 0.8);
                line-height: 1.65;
                font-size: 16px;
              }

              /* Top banner with FORRT branding */
              .forrt-banner {
                background: var(--navbar-color);
                color: white;
                padding: 0.5rem 0 0;
                border-bottom: none;
              }

              .forrt-banner-content {
                max-width: 1200px;
                margin: 0 auto;
                padding: 0 2rem;
                display: flex;
                align-items: center;
                gap: 2rem;
              }


              .forrt-logo {
                height: 110px;
                width: auto;
                display: block;
                position: relative;
                z-index: 1001;
                margin-bottom: -42px;
              }

              .forrt-title {
                font-size: 1.8rem;
                font-weight: 400;
                letter-spacing: 0.5px;
                margin: 0;
                color: var(--brand-color);
                font-family: Domine, serif;
              }

              /* Page header */
              .header {
                background: var(--background-cream);
                color: var(--text-dark);
                padding: 3rem 0 2.5rem;
                text-align: center;
                border-bottom: 1px solid var(--border-color);
              }

              .header h1 {
                margin: 0 0 1rem 0;
                font-size: 2.5rem;
                font-weight: 400;
                letter-spacing: -0.5px;
                color: #313131;
                font-family: Domine, serif;
              }

              .header p {
                margin: 0;
                font-size: 1.15rem;
                font-weight: 400;
                max-width: 900px;
                margin-left: auto;
                margin-right: auto;
                padding: 0 1rem;
                color: var(--text-muted);
                line-height: 1.65;
              }

              /* Navigation bar */
              .nav {
                background: var(--navbar-color);
                box-shadow: 0 0.125rem 0.25rem rgba(0, 0, 0, 0.11);
                padding: 0;
                position: sticky;
                top: 0;
                z-index: 1000;
              }

              .nav-container {
                max-width: 1200px;
                margin: 0 auto;
                padding: 0 2rem 0 220px;
                display: flex;
                gap: 0;
                align-items: center;
                justify-content: center;
              }

              .nav a {
                color: #fff !important;
                text-decoration: none;
                font-weight: 400;
                padding: 0.75rem 1.5rem;
                display: block;
                border-bottom: 3px solid transparent;
                transition: all 0.2s ease;
                font-size: 0.95rem;
                font-family: Domine, serif;
                position: relative;
              }

              .nav a:hover {
                color: rgba(255, 255, 255, 0.7) !important;
                border-bottom-color: var(--brand-color);
              }

              .nav a.active {
                color: var(--accent-color) !important;
                font-weight: 700;
                border-bottom-color: var(--accent-color);
              }

              /* Main content area */
              .container {
                max-width: 1200px;
                margin: 3rem auto 4rem;
                padding: 0 2rem;
                background: transparent !important;
              }

              .content {
                background: var(--background-cream) !important;
                padding: 3.5rem;
                border-radius: 8px;
              }

              .content * {
                background-color: transparent;
              }

              .content pre,
              .content code {
                background-color: var(--section-gray) !important;
              }

              /* Feature badges */
              .badge {
                display: inline-block;
                background: var(--section-gray);
                color: var(--primary-color);
                padding: 0.35rem 0.75rem;
                border-radius: 12px;
                font-size: 0.875rem;
                font-weight: 600;
                margin: 0.25rem;
              }

              /* Enhanced markdown styling */
              .markdown-body {
                box-sizing: border-box;
                min-width: 200px;
                max-width: 980px;
                margin: 0 auto;
                font-family: Domine, serif;
                font-size: 16px;
                line-height: 1.65;
                background: transparent !important;
                color: rgba(0, 0, 0, 0.8) !important;
              }

              .markdown-body * {
                background: transparent;
              }

              .markdown-body pre,
              .markdown-body code {
                background: var(--section-gray) !important;
              }

              .markdown-body h1,
              .markdown-body h2,
              .markdown-body h3,
              .markdown-body h4 {
                color: #313131 !important;
                background: transparent !important;
                border-bottom-color: var(--section-gray);
                font-family: Domine, serif;
                font-weight: 400;
                margin-top: 1.5rem;
                margin-bottom: 0.5rem;
                line-height: 1.25;
              }

              .markdown-body h1 {
                font-size: 2rem;
                border-bottom: 2px solid var(--border-color);
                padding-bottom: 0.5rem;
                background: transparent !important;
              }

              .markdown-body h2 {
                font-size: 1.5rem;
                border-bottom: 1px solid var(--section-gray);
                padding-bottom: 0.4rem;
                background: transparent !important;
              }

              .markdown-body a {
                color: var(--primary-color) !important;
                background: transparent !important;
                text-decoration: none;
                border-bottom: 1px solid transparent;
                transition: all 0.2s ease;
              }

              .markdown-body a:hover {
                color: var(--accent-color) !important;
                border-bottom-color: var(--accent-color);
                background: transparent !important;
              }

              .markdown-body code {
                background: var(--section-gray);
                padding: 0.2em 0.5em;
                border-radius: 4px;
                font-size: 0.9em;
                color: #c7254e;
                font-family: SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace;
              }

              .markdown-body pre {
                background: var(--section-gray);
                border: 1px solid var(--border-color);
                border-radius: 6px;
                padding: 1rem;
              }

              .markdown-body pre code {
                background: transparent;
                padding: 0;
                color: inherit;
              }

              .markdown-body p {
                background: transparent !important;
                color: rgba(0, 0, 0, 0.8);
              }

              .markdown-body ul,
              .markdown-body ol {
                padding-left: 2rem;
                background: transparent !important;
              }

              .markdown-body li {
                margin: 0.5rem 0;
                background: transparent !important;
                color: rgba(0, 0, 0, 0.8);
              }

              .markdown-body blockquote {
                border-left: 4px solid var(--primary-color);
                padding-left: 1rem;
                margin-left: 0;
                color: var(--text-muted);
                font-style: italic;
                background: transparent !important;
              }

              .markdown-body table {
                background: white !important;
              }

              .markdown-body td,
              .markdown-body th {
                background: transparent !important;
              }

              /* Download button with FORRT teal */
              .download-btn {
                display: inline-block;
                background: var(--primary-color);
                color: white !important;
                padding: 1rem 2.5rem;
                border-radius: 6px;
                text-decoration: none;
                font-weight: 600;
                margin: 1.5rem 0.5rem 1rem 0;
                box-shadow: 0 4px 12px rgba(0, 64, 85, 0.2);
                transition: all 0.3s ease;
                font-size: 1rem;
                font-family: Domine, serif;
                border: none;
                border-bottom: none !important;
              }

              .download-btn:hover {
                background: var(--primary-hover);
                box-shadow: 0 6px 20px rgba(0, 64, 85, 0.35);
                transform: translateY(-2px);
                border-bottom: none !important;
              }

              /* Footer with FORRT colors */
              .footer {
                background: var(--navbar-color);
                text-align: center;
                padding: 3rem 2rem;
                color: rgba(255, 255, 255, 0.9);
                margin-top: 5rem;
                border-top: none;
              }

              .footer p {
                margin: 0.5rem 0;
                font-size: 0.95rem;
                font-family: Domine, serif;
              }

              .footer a {
                color: white;
                text-decoration: none;
                font-weight: 400;
                margin: 0 0.75rem;
                border-bottom: 1px solid transparent;
                transition: all 0.2s ease;
              }

              .footer a:hover {
                color: var(--brand-color);
                border-bottom-color: var(--brand-color);
              }

              .footer-branding {
                font-size: 1.05rem;
                font-weight: 700;
                margin-bottom: 1rem;
                opacity: 1;
              }

              /* Hamburger toggle button */
              .nav-toggle {
                display: none;
                background: none;
                border: none;
                color: #fff;
                font-size: 1.5rem;
                cursor: pointer;
                padding: 0.5rem 1rem;
                line-height: 1;
                margin-left: auto;
              }

              .nav-toggle span {
                display: block;
                width: 22px;
                height: 2px;
                background: #fff;
                margin: 5px 0;
                transition: all 0.3s ease;
              }

              /* Responsive design */
              @media (max-width: 768px) {
                .forrt-banner-content {
                  padding: 0 1rem;
                }

                .forrt-logo {
                  height: 55px;
                }

                .forrt-title {
                  font-size: 1.4rem;
                }

                .header h1 {
                  font-size: 2rem;
                }

                .header p {
                  font-size: 1.05rem;
                }

                .nav {
                  position: relative;
                }

                .nav-toggle {
                  display: block;
                  padding: 0.5rem 1rem;
                }

                .nav-container {
                  flex-direction: column;
                  padding: 0;
                  gap: 0;
                  display: none;
                }

                .nav-container.open {
                  display: flex;
                }

                .nav a {
                  width: 100%;
                  text-align: center;
                  border-bottom: 1px solid rgba(255, 255, 255, 0.1);
                  border-left: none;
                  border-right: none;
                  padding: 0.75rem 1rem;
                }

                .content {
                  padding: 2rem 1.5rem;
                }

                .container {
                  margin: 2rem auto;
                  padding: 0 1rem;
                }

                .markdown-body h1 {
                  font-size: 1.75rem;
                }

                .markdown-body h2 {
                  font-size: 1.35rem;
                }
              }
            </style>
          </head>
          <body>
            <!-- FORRT Branding Banner -->
            <div class="forrt-banner">
              <div class="forrt-banner-content">
                <img src="{{ site.baseurl }}/assets/replication-checker-logo.svg" alt="Replication Checker for Zotero by FORRT" class="forrt-logo">
                <button class="nav-toggle" aria-label="Toggle navigation" onclick="document.querySelector('.nav-container').classList.toggle('open')">
                  <span></span><span></span><span></span>
                </button>
              </div>
            </div>

            <!-- Navigation -->
            <nav class="nav">
              <div class="nav-container">
                <a href="{{ site.baseurl }}/" {% if page.url == "/" or page.url == "/index.html" %}class="active"{% endif %}>Home</a>
                <a href="{{ site.baseurl }}/documentation" {% if page.url contains "documentation" %}class="active"{% endif %}>Documentation</a>
                <a href="{{ site.github.repository_url }}/releases">Download</a>
                <a href="{{ site.github.repository_url }}/issues">Report Issue</a>
                <a href="https://forrt.org/about">About FORRT</a>
              </div>
            </nav>

            <!-- Page Header -->
            <div class="header">
              <h1>{{ site.title }}</h1>
              <p>{{ site.description }}</p>
            </div>

            <div class="container">
              <div class="content">
                <article class="markdown-body">
                  {{ content }}
                </article>
              </div>
            </div>

            <!-- Footer -->
            <footer class="footer">
              <p><strong>FORRT</strong> | Framework for Open and Reproducible Research Training</p>
              <p style="margin-top: 1.5rem;">
                <a href="https://forrt.org/">FORRT Website</a>
                <a href="{{ site.github.repository_url }}">GitHub</a>
                <a href="{{ site.github.repository_url }}/releases">Releases</a>
                <a href="{{ site.github.repository_url }}/issues">Issues</a>
                <a href="https://forrt.org/flora">FLoRA Database</a>
              </p>
            </footer>
          </body>
          </html>
          EOF

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./docs
          destination: ./_site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
